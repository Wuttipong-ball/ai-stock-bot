name: AI Stock Bot

on:
  schedule:
    - cron: '30 1 * * *'
    - cron: '0 7 * * *'
    - cron: '35 9 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python ai_stock_bot.py
